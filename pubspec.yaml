name: smartsurvey
description: SmartSurvey - Smart City Building Safety App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI Components
  cupertino_icons: ^1.0.6
  
  # State Management
  provider: ^6.1.1
  
  # Network & API
  http: ^1.1.2
  connectivity_plus: ^5.0.2
  
  # Local Database (Offline Support)
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.0
  path: ^1.8.3
  
  # Image Handling
  image_picker: ^1.0.7
  
  # Charts for Analysis
  fl_chart: ^0.66.0
  
  # Location
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  
  # Local Storage
  shared_preferences: ^2.2.2
  
  # Utils
  intl: ^0.18.1
  uuid: ^4.2.1
  
  # USB Serial (Android OTG support)
  usb_serial: ^0.5.2
  file_picker: ^10.3.10
  flutter_svg: ^2.2.3
  pdfrx: ^2.2.24
  pdf: ^3.11.1
  share_plus: ^10.1.4
  archive: ^4.0.9
  path_provider: ^2.1.1

  # TFLite inference (YOLO bounding box detection)
  tflite_flutter: ^0.12.1
  image: ^4.1.7

  web: any
  flutter_libserialport: ^0.6.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/models/
